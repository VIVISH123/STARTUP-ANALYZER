<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StartWise</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <main class="container">

    <div class="brand">
      <span class="logo">🚀</span>
      <h1>STARTWISE</h1>
      <p class="tagline">AI-Assisted Startup Idea Viability Predictor</p>
    </div>

    <section class="card">

      <label>Startup / Enterprise Name</label>
      <input type="text" placeholder="e.g., Startwise Labs" />

      <label>Describe your startup idea</label>
      <textarea rows="4"
        placeholder="What problem are you solving? Who is it for? What makes it unique?"></textarea>

      <button>Analyze Idea</button>

      <div class="privacy">
        🔒 <strong>Idea Security & Privacy</strong><br/>
        Your idea is processed only for this session.<br/>
        No data is stored or shared.
      </div>

    </section>

  </main>

</body>
</html>
